name: 自动构建刷机包

on:
  push:
    branches: [ main ]
    paths-ignore: [ 'README.md', '.github/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 打包模块
        id: pack
        run: |
          ver=$(grep 'version=' module.prop | cut -d= -f2)
          filename="coloros_gms_fix_$ver.zip"
          zip -r "$filename" ./* -x ".git/*" ".github/*" "README.md" ".gitignore" "LICENSE"
          echo "zip_name=$filename" >> $GITHUB_OUTPUT
          echo "tag=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pack.outputs.tag }}
          name: Build ${{ steps.pack.outputs.tag }}
          files: coloros_gms_fix_*.zip
          body: "基于最新同步代码自动生成的 Magisk 模块。"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
